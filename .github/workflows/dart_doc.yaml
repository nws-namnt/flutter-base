# .github/workflows/dart_doc.yml
#
# Generates dart doc for both flutter_base (root) and pkgs/dart_cli,
# merges the output into a single deploy folder, then publishes to GitHub Pages.

name: Dart Doc

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]       # auto-run on every push to main
  workflow_dispatch:        # allow manual trigger from the Actions tab

# ── Permissions ─────────────────────────────────────────────────────────────
# Required by actions/deploy-pages to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# ── Concurrency ─────────────────────────────────────────────────────────────
# Cancel any in-progress deploy if a new push arrives,
# but never cancel a deployment that is already publishing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Tell GitHub this job targets the built-in Pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Flutter ────────────────────────────────────────────────
      # Uses the Flutter version declared in .fvmrc / pubspec if available,
      # otherwise falls back to the latest stable release.
      # Remove flutter-version and add fvm: true if the project uses FVM.
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true             # cache the Flutter SDK between runs

      # ── 3. Merge outputs into a single deploy folder ─────────────────────
      # deploy/
      # ├── index.html              ← landing page (created in step 8)
      # ├── api/                    ← flutter_base doc
      # └── pkgs/dart_cli/api/      ← dart_cli doc
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/api
          mkdir -p deploy/pkgs/dart_cli/api
          cp -r doc/api/. deploy/api/
          cp -r pkgs/dart_cli/doc/api/. deploy/pkgs/dart_cli/api/

      # ── 4. Create landing page ───────────────────────────────────────────
      # Simple HTML index so visitors see both doc links at the root URL.
      # Replace the content with your own branding if needed.
      - name: Create landing page
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>API Docs</title></head>
          <body>
            <h2>API Documentation</h2>
            <ul>
              <li><a href="api/">flutter_base</a></li>
              <li><a href="pkgs/dart_cli/api/">dart_cli</a></li>
            </ul>
          </body>
          </html>
          EOF

      # ── 5. Upload artifact to Pages ──────────────────────────────────────
      # Packages the deployment/ folder as a Pages artifact.
      # actions/upload-pages-artifact expects a flat folder, not a zip.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      # ── 6. Deploy to GitHub Pages ───────────────────────────────────────
      # Publishes the uploaded artifact to the Pages environment.
      # The live URL is captured in steps.deployment.outputs.page_url
      # and shown in the Actions summary.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4